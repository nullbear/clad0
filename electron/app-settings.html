<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link id="shell-theme-css" rel="stylesheet" href="./shell-themes/parchment.css"><title>clad0 App Settings</title><style>  :root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#241c15;background:#f7f0e7}
  body{margin:0;min-height:100vh;background:#f7f0e7}.shell{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:100vh}.sidebar{background:#3d2a1a;color:#fff7e8;padding:22px 14px;border-right:1px solid #1e130b}.brand{font-weight:800;letter-spacing:.03em;margin:0 0 20px;font-size:18px}.cat{display:block;width:100%;box-sizing:border-box;text-align:left;background:transparent;color:#fff7e8;border:0;border-radius:10px;padding:10px 12px;margin:4px 0;font:inherit;font-weight:700;cursor:pointer}.cat.active{background:#fff3d0;color:#3d2a1a}.body{padding:26px 30px 88px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0 0 5px;font-size:26px}.muted{color:#705f4c;margin:0;line-height:1.45}.card{background:#fffaf2;border:1px solid #dac6ad;border-radius:18px;box-shadow:0 18px 50px #0001;padding:20px}.setting-list{display:grid;gap:12px}.setting-row{display:grid;grid-template-columns:minmax(190px,260px) minmax(0,1fr);gap:20px;align-items:start;border-top:1px solid #eadcc7;padding:14px 0}.setting-row:first-child{border-top:0;padding-top:0}.setting-title{font-weight:800;color:#4a321e}.setting-desc{font-size:12px;color:#796751;margin-top:4px;line-height:1.4}.control input[type=text],.control textarea,.control select{box-sizing:border-box;width:100%;border:1px solid #ccb492;border-radius:10px;background:#fff;padding:10px 12px;font:inherit;color:#241c15}.control textarea{min-height:96px;resize:vertical}.control code{display:block;font-size:12px;word-break:break-all;background:#fff;border:1px solid #eadcc7;border-radius:9px;padding:9px;color:#5d4b39}.check{display:flex;gap:10px;align-items:center;font-weight:700}.check input{width:18px;height:18px}.actions{position:fixed;left:220px;right:0;bottom:0;display:flex;gap:10px;align-items:center;justify-content:flex-end;background:#f7f0e7cc;backdrop-filter:blur(8px);border-top:1px solid #dac6ad;padding:12px 28px}.btn,button{border:1px solid #a98a63;background:#5e3c1f;color:white;border-radius:10px;padding:9px 13px;font-weight:750;cursor:pointer}.secondary{background:#fff;color:#4a321e}.danger{background:#8b1f1f;border-color:#741919}.status{margin-right:auto;color:#356020}.error{margin-right:auto;color:#8b1f1f;white-space:pre-wrap}.hidden{display:none}.two{display:flex;gap:8px;align-items:center}.pill{display:inline-block;border:1px solid #d7c3a4;background:#fff;padding:4px 8px;border-radius:999px;font-size:12px;color:#604c37}.warn{color:#8b4c00}.small{font-size:12px;color:#806f5e}
</style></head><body>
<div class="shell"><aside class="sidebar"><div class="brand">App Settings</div><button class="cat active" data-cat="general">General</button><button class="cat" data-cat="appearance">Appearance</button><button class="cat" data-cat="paths">Paths</button><button class="cat" data-cat="advanced">Advanced</button></aside><main class="body"><div class="top"><div><h1 id="heading">General</h1><p class="muted" id="summary"></p></div><span class="pill">App-local</span></div><section class="card"><div id="content" class="setting-list">Loading…</div></section></main></div><div class="actions"><span id="status" class="status"></span><span id="error" class="error"></span><button id="save">Save</button><button id="discard" class="secondary">Discard</button></div>
<script>
const KIND='app'; let data=null,draft=null,cat='general'; const qs=s=>document.querySelector(s), qsa=s=>Array.from(document.querySelectorAll(s));
function applyShellTheme(t){t=t||'parchment';const l=document.getElementById('shell-theme-css');if(l)l.href='./shell-themes/'+encodeURIComponent(t)+'.css';document.body.dataset.shellTheme=t;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));} function setDirty(v){window.clad0Settings.setDirty(!!v);document.title=(v?'* ':'')+'clad0 App Settings';} function status(m,e=false){qs('#status').textContent=e?'':m;qs('#error').textContent=e?m:'';} function patch(path,v){const parts=path.split('.');let o=draft;while(parts.length>1){const k=parts.shift();o[k]=o[k]||{};o=o[k];}o[parts[0]]=v;if(path==='appearance.theme')applyShellTheme(v);setDirty(true);} function row(t,d,c){return `<div class="setting-row"><div><div class="setting-title">${t}</div><div class="setting-desc">${d}</div></div><div class="control">${c}</div></div>`;} function check(path,val,label){return `<label class="check"><input type="checkbox" data-path="${path}" ${val?'checked':''}><span>${label}</span></label>`;} function select(path,val,opts){return `<select data-path="${path}">${opts.map(o=>`<option value="${esc(o.id)}" ${o.id===val?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;} function num(path,val){return `<input type="text" data-path="${path}" value="${esc(val)}">`;} function openBtn(p,label='Open'){return `<div class="two"><code>${esc(p)}</code><button class="secondary" type="button" data-open="${esc(p)}">${label}</button></div>`;}
function render(){qsa('.cat').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat)); const s=draft||{}, st=s.startup||{}, ap=s.appearance||{}, ad=s.advanced||{}; let h='',sum=''; if(cat==='general'){qs('#heading').textContent='General';sum='Startup behavior and local app preferences.';h+=row('Show project picker on launch','Open the project selection window instead of immediately reopening the active project.',check('startup.openProjectPickerOnLaunch',!!st.openProjectPickerOnLaunch,'Show project picker on launch'));h+=row('Restore last project','Use the active project pointer when project picker is not forced open.',check('startup.restoreLastProject',st.restoreLastProject!==false,'Restore last project'));}
 if(cat==='appearance'){qs('#heading').textContent='Appearance';sum='App-shell appearance. Project visual themes live in Project Settings → Appearance.';h+=row('App theme','Affects desktop shell interface surfaces: project/app settings, project picker, and shell-owned UI. Native OS menus may keep the OS style.',select('appearance.theme',ap.theme||'parchment',(data.shellThemes||[{id:'parchment',label:'Default Parchment'},{id:'wiki-whitepage',label:'Wiki Whitepage'},{id:'discord-dark',label:'Discord Dark'},{id:'scifi-solar',label:'Sci-Fi Solarized'}])));h+=row('UI scale','Multiplier for settings/app shell UI. Viewer zoom remains controlled by Chromium.',num('appearance.uiScale',ap.uiScale||1));}
 if(cat==='paths'){qs('#heading').textContent='Paths';sum='Stable user-specific app files. These are not project content.'; const p=data.paths||{};h+=row('App config folder','Stores local mutable app settings and registry files.',openBtn(p.appConfigFolder,'Open Config Folder'));h+=row('App settings file','Stores this window’s local app preferences.',openBtn(p.appSettingsPath));h+=row('Projects registry','Stores the list of project folders this app knows about.',openBtn(p.projectsRegistryPath));h+=row('Default projects folder','Suggested location for newly created external project /data folders.',openBtn(p.defaultProjectsRoot));}
 if(cat==='advanced'){qs('#heading').textContent='Advanced';sum='Developer and diagnostic options.'; const p=data.paths||{};h+=row('Developer tools','Show Chromium developer tools in the View menu after saving.',check('advanced.developerTools',!!ad.developerTools,'Expose Developer Tools menu item'));h+=row('Packaged mode','Whether this copy is running as a packaged desktop app.',`<code>${esc(data.app&&data.app.packaged)}</code>`);h+=row('Install/runtime folder','Immutable executable/app resource location; not used for normal mutable settings.',openBtn(p.advancedInstallFolder||''));h+=row('App root','Runtime app source root. Diagnostic only.',openBtn(p.advancedAppRoot||''));}
 qs('#summary').textContent=sum; qs('#content').innerHTML=h; wire();}
function wire(){qsa('[data-path]').forEach(el=>{el.oninput=()=>patch(el.dataset.path,el.type==='checkbox'?el.checked:(el.dataset.path==='appearance.uiScale'?Number(el.value)||1:el.value));el.onchange=el.oninput;});qsa('[data-open]').forEach(b=>b.onclick=()=>window.clad0Settings.openPath(b.dataset.open));}
async function load(){data=await window.clad0Settings.get(KIND);draft=JSON.parse(JSON.stringify(data.settings||{}));applyShellTheme((draft.appearance&&draft.appearance.theme)||'parchment');setDirty(false);render();}
async function saveNow(){await window.clad0Settings.save(KIND,draft);status('Saved.');await load();setDirty(false);return true;}
qsa('.cat').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;render();}); qs('#save').onclick=()=>saveNow().catch(e=>status(String(e.message||e),true)); qs('#discard').onclick=()=>load().catch(e=>status(String(e.message||e),true)); window.clad0SettingsPage={saveNow}; load().catch(e=>status(String(e.message||e),true));
</script></body></html>

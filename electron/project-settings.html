<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link id="shell-theme-css" rel="stylesheet" href="./shell-themes/parchment.css"><title>clad0 Project Settings</title><style>  :root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#241c15;background:#f7f0e7}
  body{margin:0;min-height:100vh;background:#f7f0e7}.shell{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:100vh}.sidebar{background:#3d2a1a;color:#fff7e8;padding:22px 14px;border-right:1px solid #1e130b}.brand{font-weight:800;letter-spacing:.03em;margin:0 0 20px;font-size:18px}.cat{display:block;width:100%;box-sizing:border-box;text-align:left;background:transparent;color:#fff7e8;border:0;border-radius:10px;padding:10px 12px;margin:4px 0;font:inherit;font-weight:700;cursor:pointer}.cat.active{background:#fff3d0;color:#3d2a1a}.body{padding:26px 30px 88px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0 0 5px;font-size:26px}.muted{color:#705f4c;margin:0;line-height:1.45}.card{background:#fffaf2;border:1px solid #dac6ad;border-radius:18px;box-shadow:0 18px 50px #0001;padding:20px}.setting-list{display:grid;gap:12px}.setting-row{display:grid;grid-template-columns:minmax(190px,260px) minmax(0,1fr);gap:20px;align-items:start;border-top:1px solid #eadcc7;padding:14px 0}.setting-row:first-child{border-top:0;padding-top:0}.setting-title{font-weight:800;color:#4a321e}.setting-desc{font-size:12px;color:#796751;margin-top:4px;line-height:1.4}.control input[type=text],.control textarea,.control select{box-sizing:border-box;width:100%;border:1px solid #ccb492;border-radius:10px;background:#fff;padding:10px 12px;font:inherit;color:#241c15}.control textarea{min-height:96px;resize:vertical}.control code{display:block;font-size:12px;word-break:break-all;background:#fff;border:1px solid #eadcc7;border-radius:9px;padding:9px;color:#5d4b39}.check{display:flex;gap:10px;align-items:center;font-weight:700}.check input{width:18px;height:18px}.actions{position:fixed;left:220px;right:0;bottom:0;display:flex;gap:10px;align-items:center;justify-content:flex-end;background:#f7f0e7cc;backdrop-filter:blur(8px);border-top:1px solid #dac6ad;padding:12px 28px}.btn,button{border:1px solid #a98a63;background:#5e3c1f;color:white;border-radius:10px;padding:9px 13px;font-weight:750;cursor:pointer}.secondary{background:#fff;color:#4a321e}.danger{background:#8b1f1f;border-color:#741919}.status{margin-right:auto;color:#356020}.error{margin-right:auto;color:#8b1f1f;white-space:pre-wrap}.hidden{display:none}.two{display:flex;gap:8px;align-items:center}.pill{display:inline-block;border:1px solid #d7c3a4;background:#fff;padding:4px 8px;border-radius:999px;font-size:12px;color:#604c37}.warn{color:#8b4c00}.small{font-size:12px;color:#806f5e}
</style></head><body>
<div class="shell"><aside class="sidebar"><div class="brand">Project Settings</div><button class="cat active" data-cat="general">General</button><button class="cat" data-cat="appearance">Appearance</button><button class="cat" data-cat="paths">Paths</button><button class="cat" data-cat="advanced">Advanced</button></aside><main class="body"><div class="top"><div><h1 id="heading">General</h1><p class="muted" id="summary"></p></div><span class="pill">Project-local</span></div><section class="card"><div id="content" class="setting-list">Loading…</div></section></main></div><div class="actions"><span id="status" class="status"></span><span id="error" class="error"></span><button id="save">Save</button><button id="discard" class="secondary">Discard</button></div>
<script>
const KIND='project'; let data=null, draft=null, cat='general'; const qs=s=>document.querySelector(s), qsa=s=>Array.from(document.querySelectorAll(s));
function applyShellTheme(t){t=t||'parchment';const l=document.getElementById('shell-theme-css');if(l)l.href='./shell-themes/'+encodeURIComponent(t)+'.css';document.body.dataset.shellTheme=t;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setDirty(v){window.clad0Settings.setDirty(!!v);document.title=(v?'* ':'')+'clad0 Project Settings';}
function status(m,e=false){qs('#status').textContent=e?'':m; qs('#error').textContent=e?m:'';}
function patch(path,v){const parts=path.split('.');let o=draft;while(parts.length>1){const k=parts.shift();o[k]=o[k]||{};o=o[k];}o[parts[0]]=v;setDirty(true);}
function row(t,d,control){return `<div class="setting-row"><div><div class="setting-title">${t}</div><div class="setting-desc">${d}</div></div><div class="control">${control}</div></div>`;}
function text(path,val,ph=''){return `<input type="text" data-path="${path}" value="${esc(val)}" placeholder="${esc(ph)}">`;}
function area(path,val){return `<textarea data-path="${path}">${esc(val)}</textarea>`;}
function check(path,val,label){return `<label class="check"><input type="checkbox" data-path="${path}" ${val?'checked':''}><span>${label}</span></label>`;}
function select(path,val,opts){return `<select data-path="${path}">${opts.map(o=>`<option value="${esc(o.id)}" ${o.id===val?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;}
function openBtn(p,label='Open'){return `<div class="two"><code>${esc(p)}</code><button class="secondary" type="button" data-open="${esc(p)}">${label}</button></div>`;}
function render(){qsa('.cat').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat)); const s=draft||{}; const f=s.features||{}; const a=s.appearance||{}; let h='',sum='';
 if(cat==='general'){qs('#heading').textContent='General';sum='Identity and descriptive information stored with this project.';h+=row('Project name','Shown in the desktop title bar and project picker.',text('name',s.name));h+=row('Description','Optional notes about what this clad0 project contains.',area('description',s.description||''));h+=row('Allow edits','When disabled, the viewer becomes a read-only/published surface and write APIs are rejected by the server.',check('features.allowEdits',f.allowEdits!==false,'Allow editing and live project changes'));h+=row('Project created','Read-only project creation timestamp.',`<code>${esc(s.createdAt||'Unknown')}</code>`);h+=row('Last settings update','Read-only settings timestamp.',`<code>${esc(s.updatedAt||'Unknown')}</code>`);}
 if(cat==='appearance'){qs('#heading').textContent='Appearance';sum='Project-specific display features and theme selection.'; const themes=[...(data.themes||[]),{id:'custom',label:'Custom CSS file'}]; h+=row('CSS theme','Built-in viewer themes are packaged with the app shell, but the selected theme is project-specific. Custom themes may be selected from disk/path.',select('appearance.theme',a.theme||'parchment',themes));h+=row('Custom theme path','Used only when CSS theme is Custom CSS file. The project stores the reference; the app does not copy the file yet.',text('appearance.customThemePath',a.customThemePath||''));h+=row('Media display','How media-heavy entries should be presented.',select('appearance.mediaDisplay',a.mediaDisplay||'standard',[{id:'standard',label:'Standard'},{id:'compact',label:'Compact'},{id:'hidden',label:'Hidden'}]));h+=row('Media UI','Disable this for text-only projects. The viewer hides media blocks and upload controls.',check('features.mediaEnabled',f.mediaEnabled!==false,'Enable media features'));h+=row('Sunburst View','Disable this when the project does not use visual hierarchy browsing. The toolbar and menu item are blocked.',check('features.sunburstEnabled',f.sunburstEnabled!==false,'Enable Sunburst View'));h+=row('Stats UI','Disable this when the project does not use stat sheets. The viewer hides stat badges, blocks, and editors.',check('features.statsEnabled',f.statsEnabled!==false,'Enable stat sheets'));h+=row('Stale tracking','When disabled, no stale flags are calculated or shown.',check('features.staleTrackingEnabled',f.staleTrackingEnabled!==false,'Enable stale tracking'));}
 if(cat==='paths'){qs('#heading').textContent='Paths';sum='Project-owned files and folders. These live outside the packaged executable.'; const p=data.paths||{}; h+=row('Project folder','The active external /data folder for this project.',openBtn(p.projectFolder||p.dataDir,'Open Project Folder'));h+=row('Project settings file','Stores this window’s project-specific settings.',openBtn(p.projectSettingsPath));h+=row('clado.json','Stores taxonomy/tree structure and light metadata, including last-saved timestamps.',openBtn(p.cladoJsonPath));h+=row('Prose folder','Stores per-entry prose chunks.',openBtn(p.proseDir));h+=row('Stats folder','Stores per-entry stat sheets when enabled.',openBtn(p.statsDir));h+=row('Media folder','Stores image/banner files when enabled.',openBtn(p.mediaDir));}
 if(cat==='advanced'){qs('#heading').textContent='Advanced';sum='Project maintenance actions and raw project information.'; h+=row('Backup project','Create a timestamped backup copy of this project folder.',`<button type="button" class="secondary" id="backup-project">Backup Project…</button><div class="small">Copies clado.json, project-settings.json, prose, stats, and media into a timestamped backup folder.</div>`);h+=row('Custom field templates','Reusable editor/layout presets stored with the project. JSON array of { id, name, fields }.',`<textarea id="templates-json">${esc(JSON.stringify(s.templates||[],null,2))}</textarea><div class="small">Templates are used by future structured-field creation flows and shell context menus.</div>`);h+=row('Data check','Run a read-only sanity check for duplicate slugs/SIDs and missing IDs.',`<button type="button" class="secondary" disabled>Run Data Check</button><div class="small">Existing /api/sanity support can back this action.</div>`);h+=row('Project ID','Internal project registry pointer.',`<code>${esc(data.project&&data.project.id)}</code>`);}
 qs('#summary').textContent=sum; qs('#content').innerHTML=h; wire();}
function wire(){qsa('[data-path]').forEach(el=>{el.oninput=()=>patch(el.dataset.path,el.type==='checkbox'?el.checked:el.value);el.onchange=el.oninput;});qsa('[data-open]').forEach(b=>b.onclick=()=>window.clad0Settings.openPath(b.dataset.open)); const tj=qs('#templates-json'); if(tj) tj.oninput=()=>{try{draft.templates=JSON.parse(tj.value||'[]');tj.classList.remove('bad');setDirty(true);}catch(e){tj.classList.add('bad');status('Templates JSON is invalid: '+e.message,true);}}; const bk=qs('#backup-project'); if(bk) bk.onclick=async()=>{try{const r=await window.clad0Settings.backupProject(); if(r&&!r.canceled) status('Backup created: '+r.path);}catch(e){status(String(e.message||e),true);}};}
async function load(){data=await window.clad0Settings.get(KIND);applyShellTheme(data.shellTheme||'parchment');draft=JSON.parse(JSON.stringify(data.settings||{}));setDirty(false);render();}
async function saveNow(){await window.clad0Settings.save(KIND,draft);status('Saved.');await load();setDirty(false);return true;}
qsa('.cat').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;render();}); qs('#save').onclick=()=>saveNow().catch(e=>status(String(e.message||e),true)); qs('#discard').onclick=()=>load().catch(e=>status(String(e.message||e),true)); window.clad0SettingsPage={saveNow}; load().catch(e=>status(String(e.message||e),true));
</script></body></html>

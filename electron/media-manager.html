<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>clad0 Media Library</title><link id="shell-theme-css" rel="stylesheet" href="./shell-themes/parchment.css"><style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#241c15;background:#f7f0e7}body{margin:0;min-height:100vh;background:#f7f0e7}.shell{display:flex;min-height:100vh;flex-direction:column}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #dac6ad;background:#fff8ed}.title h1{margin:0;font-size:24px}.title p{margin:4px 0 0;color:#705f4c}.actions{display:flex;gap:8px}button{border:1px solid #a98a63;background:#5e3c1f;color:white;border-radius:10px;padding:9px 13px;font-weight:750;cursor:pointer}.secondary{background:#fff;color:#4a321e}.body{padding:20px 24px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}.card{background:#fffaf2;border:1px solid #dac6ad;border-radius:14px;box-shadow:0 10px 30px #0001;padding:10px;display:flex;flex-direction:column;gap:8px}.thumb{height:132px;border:1px solid #eadcc7;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.thumb img{max-width:100%;max-height:100%;object-fit:contain}.file{font-weight:800;word-break:break-word;font-size:13px}.meta{font-size:12px;color:#705f4c}.empty{padding:40px;text-align:center;color:#705f4c;border:1px dashed #cbb592;border-radius:16px;background:#fffaf2}.status{color:#705f4c;margin-bottom:14px}.path{font-family:ui-monospace,Consolas,monospace;font-size:12px;word-break:break-all;color:#705f4c}.tools{display:flex;gap:8px;flex-wrap:wrap}.tools button{font-size:12px;padding:6px 8px}
</style></head><body><div class="shell"><header class="top"><div class="title"><h1>Media Library</h1><p id="sub">Project media files stored in /data/media.</p></div><div class="actions"><button class="secondary" id="open-folder">Open Media Folder</button><button id="refresh">Refresh</button></div></header><main class="body"><div id="status" class="status">Loading…</div><div id="grid" class="grid"></div></main></div><script>
const qs=s=>document.querySelector(s);function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function fmt(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return (b/1048576).toFixed(1)+' MB';}function applyShellTheme(t){const l=qs('#shell-theme-css'); if(l) l.href='./shell-themes/'+encodeURIComponent(t||'parchment')+'.css';}
async function load(){try{applyShellTheme(await window.clad0Media.getShellTheme());const d=await window.clad0Media.list();qs('#sub').textContent=(d.project?d.project.name:'Project')+' — '+d.mediaDir;const files=d.files||[];qs('#status').textContent=files.length+' media file'+(files.length===1?'':'s');const g=qs('#grid');g.innerHTML='';if(!files.length){g.innerHTML='<div class="empty">No media files found in this project.</div>';return;}files.forEach(f=>{const c=document.createElement('div');c.className='card';const isImg=/\.(png|jpe?g|webp|gif|svg)$/i.test(f.relativePath);c.innerHTML='<div class="thumb">'+(isImg?'<img src="'+esc(f.url)+'" alt="">':'<span>File</span>')+'</div><div class="file">'+esc(f.relativePath)+'</div><div class="meta">'+fmt(f.bytes)+' · '+esc(new Date(f.modifiedAt).toLocaleString())+'</div><div class="path">'+esc(f.path)+'</div><div class="tools"><button class="secondary" data-open="'+esc(f.path)+'">Open</button></div>';g.appendChild(c);});document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>window.clad0Media.openFile(b.dataset.open));}catch(e){qs('#status').textContent=String(e.message||e);}}
qs('#refresh').onclick=load;qs('#open-folder').onclick=()=>window.clad0Media.openFolder();load();
</script></body></html>
